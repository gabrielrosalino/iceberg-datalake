iceberg_datalake:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_DATABASE', '/opt/airflow/data/duckdb/lakehouse.duckdb') }}"
      threads: 4
      extensions:
        - httpfs
        - parquet
        - json
      settings:
        s3_region: us-east-1
        s3_endpoint: "{{ env_var('MINIO_ENDPOINT', 'http://minio:9000') }}"
        s3_access_key_id: "{{ env_var('MINIO_ROOT_USER', 'minioadmin') }}"
        s3_secret_access_key: "{{ env_var('MINIO_ROOT_PASSWORD', 'minioadmin') }}"
        s3_url_style: path
        s3_use_ssl: false
